syntax = "proto3";

package bots;

service BotsService {
  // List all messaging bots.
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
  // Get a single bot by id.
  rpc GetBot(GetBotRequest) returns (GetBotResponse);
  // Enable a bot.
  rpc EnableBot(EnableBotRequest) returns (EnableBotResponse);
  // Disable a bot.
  rpc DisableBot(DisableBotRequest) returns (DisableBotResponse);
  // Service liveness check.
  rpc Health(HealthRequest) returns (HealthResponse);
}

message BotProto {
  string id         = 1;
  string name       = 2;
  string kind_label = 3;
  bool   enabled    = 4;
}

message ListBotsRequest {}

message ListBotsResponse {
  repeated BotProto bots = 1;
}

message GetBotRequest {
  string id = 1;
}

message GetBotResponse {
  BotProto bot   = 1;
  bool     found = 2;
}

message EnableBotRequest {
  string id = 1;
}

message EnableBotResponse {
  bool ok = 1;
}

message DisableBotRequest {
  string id = 1;
}

message DisableBotResponse {
  bool ok = 1;
}

message HealthRequest {}

message HealthResponse {
  bool   ok      = 1;
  string version = 2;
}
